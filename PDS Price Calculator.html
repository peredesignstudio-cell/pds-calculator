document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 1; }\n  a { color: oklch(0.32 0.1 152); }\n  a:hover { color: oklch(0.24 0.1 152); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div dir=\"rtl\" style=\"min-height:100vh; background: oklch(0.99 0.004 150); color: oklch(0.28 0.01 150); padding: 0 0 80px;\">\n\n  <!-- Header -->\n  <div style=\"display:flex; flex-direction:column; align-items:center; padding: 48px 24px 0; border-bottom: 1px solid oklch(0.9 0.01 150); background: oklch(0.99 0.004 150);\">\n    <img src=\"b92e2a32-e46d-4efd-9875-0b23ee1eca41\" alt=\"PERE Design Studio\" style=\"width:110px; height:110px; object-fit:contain; margin-bottom:8px;\">\n    <div style=\"font-size:12px; letter-spacing:3.5px; color: oklch(0.32 0.08 152); font-weight:600; margin-bottom:20px;\">WILD BY NATURE, PRECISE BY DESIGN<\u002Fdiv>\n    <h1 style=\"font-size:28px; font-weight:700; margin:0 0 8px; color: oklch(0.24 0.02 150); letter-spacing:0.5px;\">מחשבון הערכת מחיר לשיפוץ<\u002Fh1>\n    <p style=\"font-size:14.5px; color: oklch(0.48 0.01 150); margin:0 0 28px; max-width:560px; text-align:center; line-height:1.6;\">בנו הערכת מחיר גסה לפי שלושת מוקדי ההוצאה בשיפוץ: עבודות קבלן, ספקים ומערכות, וריהוט ואביזרים.<\u002Fp>\n\n    <div style=\"width:100%; max-width:1100px; display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px;\">\n      <input type=\"text\" placeholder=\"שם הלקוח\" value=\"{{ clientName }}\" sc-camel-on-change=\"{{ updateClientName }}\" style=\"flex:1; min-width:220px; box-sizing:border-box; font-family:'Heebo',sans-serif; font-size:14px; font-weight:500; padding:10px 14px; border-radius:10px; border:1px solid oklch(0.85 0.05 148); background:oklch(0.96 0.03 142); color: oklch(0.26 0.02 150);\">\n      <input type=\"text\" placeholder=\"כתובת הנכס / הפרויקט\" value=\"{{ clientAddress }}\" sc-camel-on-change=\"{{ updateClientAddress }}\" style=\"flex:2; min-width:260px; box-sizing:border-box; font-family:'Heebo',sans-serif; font-size:14px; font-weight:500; padding:10px 14px; border-radius:10px; border:1px solid oklch(0.85 0.05 148); background:oklch(0.96 0.03 142); color: oklch(0.26 0.02 150);\">\n    <\u002Fdiv>\n    <div style=\"width:100%; max-width:1100px; margin-bottom:20px;\">\n      <textarea placeholder=\"תיאור קצר של הפרויקט (היקף העבודה, מטרות, הערות)\" value=\"{{ projectDescription }}\" sc-camel-on-change=\"{{ updateProjectDescription }}\" rows=\"2\" style=\"width:100%; box-sizing:border-box; resize:vertical; font-family:'Heebo',sans-serif; font-size:14px; font-weight:500; padding:10px 14px; border-radius:10px; border:1px solid oklch(0.85 0.05 148); background:oklch(0.96 0.03 142); color: oklch(0.26 0.02 150); line-height:1.5;\"><\u002Ftextarea>\n    <\u002Fdiv>\n\n    <!-- Budget banner -->\n    <div style=\"width:100%; max-width:1100px; display:flex; flex-direction:column; gap:24px;\">\n      <div style=\"{{ budgetBar.wrapStyle }}\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n          <div style=\"display:flex; flex-direction:column; align-items:flex-start; gap:6px;\">\n            <span style=\"font-size:13px; color: oklch(0.96 0.03 150); font-weight:700; letter-spacing:0.3px;\">תקציב כולל לפרויקט<\u002Fspan>\n            <div dir=\"ltr\" style=\"display:flex; align-items:center; gap:6px;\">\n              <span style=\"font-size:20px; color: oklch(0.96 0.03 150); font-weight:800;\">₪<\u002Fspan>\n              <input type=\"number\" min=\"0\" value=\"{{ budgetBar.totalBudgetValue }}\" sc-camel-on-change=\"{{ budgetBar.updateTotalBudget }}\" style=\"{{ budgetBar.totalInputStyle }}\">\n            <\u002Fdiv>\n            <span dir=\"ltr\" style=\"font-size:12.5px; font-weight:600; unicode-bidi:isolate; color: {{ budgetBar.remainingColor }};\">{{ budgetBar.remainingLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n            <button sc-camel-on-click=\"{{ budgetBar.exportPdf }}\" style=\"border:1px solid oklch(1 0 0 / 0.6); background:oklch(1 0 0 / 0.12); color:#fff; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:9px; cursor:pointer; font-family:'Heebo',sans-serif;\">ייצוא מסמך PDF<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ budgetBar.resetBudgets }}\" style=\"border:1px solid oklch(1 0 0 / 0.5); background:transparent; color:#fff; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:9px; cursor:pointer; font-family:'Heebo',sans-serif;\">אפס תקציבים<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; width:100%; background: oklch(1 0 0 / 0.25);\"><\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:18px; width:100%;\">\n          <sc-for list=\"{{ budgetBar.rows }}\" as=\"row\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; flex-direction:column; align-items:flex-start; gap:6px;\">\n              <span style=\"font-size:13px; color: oklch(0.96 0.03 150); font-weight:700;\">{{ row.label }}<\u002Fspan>\n              <div dir=\"ltr\" style=\"display:flex; align-items:center; gap:6px;\">\n                <span style=\"font-size:15px; color: oklch(0.96 0.03 150); font-weight:700;\">₪<\u002Fspan>\n                <input type=\"number\" min=\"0\" value=\"{{ row.budgetValue }}\" sc-camel-on-change=\"{{ row.updateBudget }}\" style=\"{{ budgetBar.inputStyle }}\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tabs banner -->\n      <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n        <div style=\"display:flex; gap:6px; background: oklch(0.95 0.008 150); padding:6px; border-radius:14px;\">\n          <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ tab.select }}\" style=\"{{ tab.btnStyle }}\">{{ tab.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <button sc-camel-on-click=\"{{ resetAll }}\" style=\"border:1px solid oklch(0.75 0.1 25); background:transparent; color:oklch(0.5 0.16 25); font-size:13px; font-weight:600; padding:9px 16px; border-radius:10px; cursor:pointer; font-family:'Heebo',sans-serif;\">אפס את כל הבחירות<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Contractor tab -->\n  <sc-if value=\"{{ isContractor }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:1100px; margin:0 auto; padding: 40px 24px 0; display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:32px; align-items:start;\">\n\n      <div>\n        <div style=\"margin-bottom:32px;\">\n          <h2 style=\"font-size:18px; font-weight:700; margin:0 0 4px; color: oklch(0.28 0.02 150);\">רמת גימור<\u002Fh2>\n          <p style=\"font-size:13px; color: oklch(0.55 0.01 150); margin:0 0 16px;\">רמת הגימור משפיעה על טווח המחיר למ״ר<\u002Fp>\n          <div style=\"display:flex; gap:10px; background: oklch(0.95 0.008 150); padding:6px; border-radius:12px;\">\n            <sc-for list=\"{{ tiers }}\" as=\"tier\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ tier.select }}\" style=\"{{ tier.btnStyle }}\">\n                <span style=\"display:block; font-size:14.5px; font-weight:700;\">{{ tier.label }}<\u002Fspan>\n                <sc-if value=\"{{ tier.subtitle }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"display:block; font-size:10.5px; margin-top:1px; opacity:0.8; font-weight:500;\">{{ tier.subtitle }}<\u002Fspan>\n                <\u002Fsc-if>\n                <span dir=\"ltr\" style=\"display:block; font-size:11.5px; margin-top:2px; opacity:0.85; unicode-bidi:isolate;\">{{ tier.rangeLabel }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-size:18px; font-weight:700; margin:0 0 4px; color: oklch(0.28 0.02 150);\">שטח כללי של הנכס<\u002Fh2>\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:24px;\">\n          <input type=\"number\" min=\"0\" value=\"{{ totalPropertySqm }}\" sc-camel-on-change=\"{{ updateTotalPropertySqm }}\" style=\"width:90px; text-align:center; font-size:16px; font-weight:700; padding:8px 6px; border-radius:9px; border:1px solid oklch(0.75 0.07 148); background:oklch(0.92 0.045 145); color: oklch(0.26 0.02 150);\">\n          <span style=\"font-size:13.5px; color: oklch(0.5 0.01 150);\">מ״ר ברוטו (לפי תשריט / חוזה)<\u002Fspan>\n        <\u002Fdiv>\n\n        <h2 style=\"font-size:18px; font-weight:700; margin:0 0 4px; color: oklch(0.28 0.02 150);\">חללים בדירה<\u002Fh2>\n        <p style=\"font-size:13px; color: oklch(0.55 0.01 150); margin:0 0 14px;\">בחרו חלל מהרשימה כדי להוסיף אותו, והזינו את השטח שלו במ״ר<\u002Fp>\n\n        <sc-if value=\"{{ hasRoomOptions }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-raw-select sc-camel-on-change=\"{{ addRoomFromSelect }}\" value=\"\" style=\"width:100%; box-sizing:border-box; font-family:'Heebo',sans-serif; font-size:14.5px; font-weight:600; padding:12px 14px; border-radius:10px; border:1px dashed oklch(0.6 0.1 150); background: oklch(0.97 0.015 145); color: oklch(0.32 0.1 152); margin-bottom:18px;\">\n            <option value=\"\" disabled=\"{{ true }}\">+ הוסיפו חלל מהרשימה<\u002Foption>\n            <sc-for list=\"{{ roomAddOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <option value=\"{{ opt.id }}\">{{ opt.name }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-select>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <sc-for list=\"{{ rooms }}\" as=\"room\" hint-placeholder-count=\"8\">\n            <sc-if value=\"{{ room.not =\"font-size:12px; color: oklch(0.55 0.01 150); margin-left:4px;\">כמות חדרים<\u002Fspan>\n                    <button sc-camel-on-click=\"{{ room.removeUnit }}\" style=\"{{ room.qtyStepStyle }}\">−<\u002Fbutton>\n                    <span style=\"font-size:13px; font-weight:600; min-width:14px; text-align:center; color: oklch(0.3 0.01 150);\">{{ room.unitCount }}<\u002Fspan>\n                    <button sc-camel-on-click=\"{{ room.addUnit }}\" style=\"{{ room.qtyStepStyle }}\">+<\u002Fbutton>\n                    <button sc-camel-on-click=\"{{ room.remove }}\" style=\"{{ room.removeBtnStyle }}\">×<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n                  <sc-for list=\"{{ room.units }}\" as=\"unit\" hint-placeholder-count=\"1\">\n                    <div style=\"display:flex; align-items:center; gap:6px; background:#fff; padding:6px 10px; border-radius:8px; border:1px solid oklch(0.87 0.01 150);\">\n                      <span style=\"font-size:13px; color: oklch(0.45 0.01 150);\">{{ unit.label }}<\u002Fspan>\n                      <input type=\"number\" min=\"0\" value=\"{{ unit.sqm }}\" sc-camel-on-change=\"{{ unit.updateSqm }}\" style=\"{{ unit.inputStyle }}\">\n                      <span style=\"font-size:12px; color: oklch(0.55 0.01 150);\">מ״ר<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:32px;\">\n        <\u002Fdiv>\n\n        <p style=\"font-size:11.5px; color: oklch(0.6 0.01 150); line-height:1.7; margin-top:28px; border-top:1px solid oklch(0.91 0.01 150); padding-top:16px;\">\n          * ההערכה מבוססת על טווח מחיר למ״ר לפי רמת הגימור, כאשר כל סוג חלל מקבל משקל יחסי בהתאם ליוקר העבודה בו (חללים רטובים כמו מטבח ואמבטיה יקרים למ״ר משמעותית יותר ממסדרון או :11.5px;\">({{ item.sqm }} מ״ר)<\u002Fspan><\u002Fspan>\n              <span dir=\"ltr\" style=\"font-weight:600; white-space:nowrap; unicode-bidi:isolate;\">{{ item.rangeLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ hasNoRooms }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px; color: {{ budgetBar.panelMutedColor }}; padding:8px 0;\">בחרו לפחות חלל אחד כדי לראות פירוט<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Suppliers tab -->\n  <sc-if value=\"{{ isSuppliers }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1100px; margin:0 auto; padding: 40px 24px 0; display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:32px; align-items:start;\">\n      <div>\n        <h2 style=\"font-size:18px; font-weight:700; margin:0 0 4px; color: oklch(0.28 0.02 150);\">ספקים ומערכות<\u002Fh2>\n        <p style=\"font-size:13px; color: oklch(0.55 0.01 150); margin:0 0 14px;\">בחרו ספק מהרשימה כדי להוסיף אותו, והזינו את הפרטים והמחיר<\u002Fp>\n\n        <sc-if value=\"{{ hasSupplierCategoryOptions }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-raw-select sc-camel-on-change=\"{{ addSupplierCategoryFromSelect }}\" value=\"\" style=\"width:100%; box-sizing:border-box; font-family:'Heebo',sans-serif; font-size:14.5px; font-weight:600; padding:12px 14px; border-radius:10px; border:1px dashed oklch(0.6 0.1 150); background: oklch(0.97 0.015 145); color: oklch(0.32 0.1 152); margin-bottom:18px;\">\n            <option value=\"\" disabled=\"{{ true }}\">+ הוסיפו ספק מהרשימה<\u002Foption>\n            <sc-for list=\"{{ supplierCategoryAddOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <option value=\"{{ opt.id }}\">{{ opt.label }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-select>\n        <\u002Fsc-if>\n\n        <div style=\"display:f veBtnStyle }}\">−<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ room.hasItemOptions }}\" hint-placeholder-val=\"{{ true }}\">\n                <sc-raw-select sc-camel-on-change=\"{{ room.addItemFromSelect }}\" value=\"\" style=\"width:100%; box-sizing:border-box; font-family:'Heebo',sans-serif; font-size:13.5px; font-weight:600; padding:10px 12px; border-radius:9px; border:1px dashed oklch(0.6 0.1 150); background: oklch(0.97 0.015 145); color: oklch(0.32 0.1 152);\">\n                  <option value=\"\" disabled=\"{{ true }}\">+ הוסיפו פריט ריהוט מהרשימה<\u002Foption>\n                  <sc-for list=\"{{ room.itemAddOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                    <option value=\"{{ opt.id }}\">{{ opt.label }}<\u002Foption>\n                  <\u002Fsc-for>\n                <\u002Fsc-raw-select>\n              <\u002Fsc-if>\n\n              <sc-for list=\"{{ room.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:12px; border-radius:10px; background:#fff; border:1px solid oklch(0.9 0.01 150);\">\n                  <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n                    <span style=\"font-size:13.5px; font-weight:600; color: oklch(0.26 0.01 150);\">{{ it.label }}<\u002Fspan>\n                    <sc-if value=\"{{ it.isCurtain }}\" hint-placeholder-val=\"{{ false }}\">\n                      <sc-raw-select sc-camel-on-change=\"{{ it.updateCurtainType }}\" disabled=\"{{ it.disabled }}\" style=\"{{ it.sizeInputStyle }}\">\n                        <sc-for list=\"{{ it.curtainTypeOptions }}\" as=\"ct\" hint-placeholder-count=\"5\">\n                          <option value=\"{{ ct.id }}\" selected=\"{{ ct.isSelected }}\">{{ ct.label }}<\u002Foption>\n                        <\u002Fsc-for>\n                      <\u002Fsc-raw-select>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.hasSize }}\" hint-placeholder-val=\"{{ false }}\">\n                      <input type=\"text\" placeholder=\"מידה (ס״מ)\" value=\"{{ it.size }}\" sc-camel-on-change=\"{{ it.updateSize }}\" disabled=\"{{ it.disabled }}\" style=\"{{ it.sizeInputStyle }}\">\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.hasQty }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex; align-items:center; gap:6px;\">\n                        <input type=\"number\" min=\"1\" value=\"{{ it.qty }}\" sc-camel-on-change=\"{{ it.updateQty }}\" disabled=\"{{ it.disabled }}\" style=\"{{ it.inputStyle }}\">\n                        <span style=\"font-size:12px; color: oklch(0.55 0.01 150);\">כמות<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.hasPerUnitSize }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex; align-items:center; gap:6px; flex-wrap:wrap;\">\n                        <sc-for list=\"{{ it.unitSizes }}\" as=\"us\" hint-placeholder-count=\"2\">\n                          <div style=\"display:flex; align-items:center; gap:6px; background:oklch(0.98 0.006 150); padding:4px 6px; border-radius:7px;\">\n                            <span style=\"font-size:11px; color: oklch(0.55 0.01 150);\">{{ us.label }}:<\u002Fspan>\n                            <input type=\"text\" placeholder=\"מידה\" value=\"{{ us.value }}\" sc-camel-on-change=\"{{ us.update }}\" disabled=\"{{ it.disabled }}\" style=\"{{ us.inputStyle }}\">\n                            <div dir=\"ltr\" style=\"display:flex; align-items:center; gap:4px;\">\n                              <input type=\"number\" min=\"0\" value=\"{{ us.price.low }}\" sc-camel-on-change=\"{{ us.updatePriceLow }}\" disabled=\"{{ it.disabled }}\" style=\"{{ us.priceInputStyle }}\">\n                              <span style=\"font-size:11px; color: oklch(0.55 0.01 150);\">–<\u002Fspan>\n                              <input type=\"number\" min=\"0\" value=\"{{ us.price.high }}\" sc-camel-on-change=\"{{ us.updatePriceHigh }}\" disabled=\"{{ it.disabled }}\" style=\"{{ us.priceInputStyle }}\">\n                              <span style=\"font-size:11px; color: oklch(0.55 0.01 150);\">₪<\u002Fspan>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.showSharedPrice }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div dir=\"ltr\" style=\"display:flex; align-items:center; gap:6px;\">\n                      <input type=\"number\" min=\"0\" value=\"{{ it.low }}\" sc-camel-on-change=\"{{ it.updateLow }}\" disabled=\"{{ it.disabled }}\" style=\"{{ it.inputStyle }}\">\n                      <span style=\"font-size:12px; color: oklch(0.55 0.01 150);\">–<\u002Fspan>\n                      <input type=\"number\" min=\"0\" value=\"{{ it.high }}\" sc-camel-on-change=\"{{ it.updateHigh }}\" disabled=\"{{ it.disabled }}\" style=\"{{ it.inputStyle }}\">\n                      <span style=\"font-size:12px; color: oklch(0.55 0.01 150);\">₪ ליחידה<\u002Fspan>\n                    <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:10px;\">\n                    <span dir=\"ltr\" style=\"font-weight:600; font-size:13px; unicode-bidi:isolate; white-space:nowrap;\">{{ it.lineRangeLabel }}<\u002Fspan>\n                    <button sc-camel-on-click=\"{{ it.remove }}\" style=\"{{ it.removeBtnStyle }}\">×<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <button sc-camel-on-click=\"{{ addFurnitureRoom }}\" style=\"border:1px dashed oklch(0.45 0.1 150); background:transparent; color:oklch(0.3 0.1 152); font-size:13.5px; font-weight:600; padding:10px 16px; border-radius:8px; cursor:pointer; font-family:'Heebo',sans-serif;\">+ הוסף חדר<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size:11.5px; color: oklch(0.6 0.01 150); line-height:1.7; margin-top:28px; border-top:1px solid oklch(0.91 0.01 150); padding-top:16px;\">\n          * טווחי המחיר הם הערכה גסה לריהוט, טקסטיל ואביזרי עיצוב לפי פריט וכמות. המחירים בפועל תלויים במותג, בדגם ובכמות הפריטים בפועל. הפירוט בפאנל מסכם כמות כוללת לכל סוג פריט על פני כל החדרים.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:sticky; top:24px; right:0; min-width:0; background: {{ budgetBar.panelBg }}; border-radius:20px; padding:28px 26px; color: white; box-shadow: 0 20px 40px -12px oklch(0.22 0.035 155 / 0.35);\">\n        <div style=\"font-size:12.5px; letter-spacing:1.5px; color: {{ budgetBar.panelMutedColor }}; font-weight:600; margin-bottom:6px;\">עלות ריהוט ואביזרים<\u002Fdiv>\n        <div dir=\"ltr\" style=\"font-size:28px; font-weight:800; line-height:1.25; margin-bottom:4px; unicode-bidi:isolate; text-align:right; overflow-wrap:break-word; color: {{ budgetBar.totalTextColor }};\">{{ furnitureTotalLabel }}<\u002Fdiv>\n        <div style=\"font-size:13px; color: {{ budgetBar.panelMutedColor }}; margin-bottom:20px;\">{{ furnitureCountLabel }}<\u002Fdiv>\n        <sc-if value=\"{{ budgetBar.isOver }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px; font-weight:700; color: oklch(0.72 0.19 25); margin:-12px 0 16px;\">{{ budgetBar.warningLabel }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-size:12px; color: {{ budgetBar.panelMutedColor }}; margin-bottom:12px; margin-top:-8px;\">סה״כ לפי סוג פריט (כל החדרים)<\u002Fdiv>\n        <div style=\"height:1px; background: oklch(1 0 0 / 0.12); margin-bottom:18px;\"><\u002Fdiv>\n        <div style=\"font-size:12.5px; letter-spacing:1px; color: {{ budgetBar.panelMutedColor }}; font-weight:600; margin-bottom:12px;\">פירוט לפי פריט<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; max-height:340px; overflow-y:auto; padding-left:4px;\">\n          <sc-for list=\"{{ furnitureBreakdown }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; font-size:13.5px;\">\n              <span style=\"color: {{ budgetBar.panelTextColor }};\">{{ item.name }}<\u002Fspan>\n              <span dir=\"ltr\" style=\"font-weight:600; white-space:nowrap; unicode-bidi:isolate;\">{{ item.rangeLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ hasNoFurniture }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px; color: {{ budgetBar.panelMutedColor }}; padding:8px 0;\">בחרו לפחות פריט אחד כדי לראות פירוט<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"text-align:center; padding:32px 24px 0; display:flex; flex-direction:column; align-items:center; gap:6px;\">\n    <span style=\"font-size:12px; letter-spacing:3px; color: oklch(0.6 0.02 150); font-weight:600;\">PERE DESIGN STUDIO<\u002Fspan>\n    <span style=\"font-size:10.5px; letter-spacing:2px; color: oklch(0.65 0.02 150); font-weight:500;\">WILD BY NATURE, PRECISE BY DESIGN<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;rateBasicLow&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2500,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:500,&quot;max&quot;:10000,&quot;step&quot;:100,&quot;section&quot;:&quot;מחירון קבלן - בסיסי (₪ למ\\&quot;ר)&quot;},&quot;rateBasicHigh&quot;:{&quot;editor
